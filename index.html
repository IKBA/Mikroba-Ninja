<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Antigravity Microbe Ninja</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        
        <!-- Sisi Kiri: Tim Bakteri -->
        <div id="side-left" class="game-side">
            <div class="hud">
                <div class="team-name text-cyan">TIM BAKTERI</div>
                <div class="stats">
                    <div class="score">LVL <span id="level-left">1</span> | Skor: <span id="score-left">0</span></div>
                    <div class="lives" id="lives-left">
                        <div class="heart"></div>
                        <div class="heart"></div>
                        <div class="heart"></div>
                    </div>
                </div>
            </div>
            <canvas id="canvas-left"></canvas>
        </div>

        <!-- Pembatas Tengah Layar -->
        <div id="center-divider"></div>

        <!-- Sisi Kanan: Tim Virus -->
        <div id="side-right" class="game-side">
            <div class="hud">
                <div class="team-name text-magenta">TIM VIRUS</div>
                <div class="stats">
                    <div class="score">LVL <span id="level-right">1</span> | Skor: <span id="score-right">0</span></div>
                    <div class="lives" id="lives-right">
                        <div class="heart"></div>
                        <div class="heart"></div>
                        <div class="heart"></div>
                    </div>
                </div>
            </div>
            <canvas id="canvas-right"></canvas>
        </div>

    </div>

    <!-- UI Overlay Layar Penuh (Awal/Game Over) -->
    <div id="ui-overlay" class="overlay active">
        <div id="start-screen" class="panel active">
            <h1 class="glitch-text" data-text="MICROBE NINJA">MICROBE NINJA</h1>
            <p class="subtitle">Antigravity Zero-G Simulation</p>
            
            <div class="instructions-row">
                <div class="instruction-box border-cyan">
                    <h3 class="text-cyan">Pemain Kiri</h3>
                    <p>Potong <strong>Bakteri Hijau</strong></p>
                    <p>Hindari <strong>Virus Merah</strong>!</p>
                </div>
                <div class="instruction-box border-magenta">
                    <h3 class="text-magenta">Pemain Kanan</h3>
                    <p>Potong <strong>Virus Merah</strong></p>
                    <p>Hindari <strong>Bakteri Hijau</strong>!</p>
                </div>
            </div>

            <button id="btn-start" class="btn">MULAI SIMULASI</button>
        </div>

        <div id="game-over-screen" class="panel">
            <h1 class="glitch-text text-red" data-text="SIMULASI BERAKHIR">SIMULASI BERAKHIR</h1>
            <div id="winner-text" class="subtitle"></div>
            
            <div class="final-scores">
                <div class="final-score-box text-cyan">
                    <p>Bakteri</p>
                    <h2 id="final-score-left">0</h2>
                </div>
                <div class="final-score-box text-magenta">
                    <p>Virus</p>
                    <h2 id="final-score-right">0</h2>
                </div>
            </div>

            <button id="btn-restart" class="btn">ULANGI SIMULASI</button>
        </div>
    </div>

    <!-- Audio Control Panel -->
    <div id="audio-controls">
        <button id="btn-audio-toggle" class="audio-toggle-btn" title="Audio Settings">
            <svg id="icon-sound-on" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            </svg>
            <svg id="icon-sound-off" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                <line x1="23" y1="9" x2="17" y2="15"></line>
                <line x1="17" y1="9" x2="23" y2="15"></line>
            </svg>
        </button>

        <div id="audio-panel" class="audio-panel">
            <div class="audio-panel-header">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                AUDIO
            </div>

            <div class="volume-group">
                <div class="volume-label">
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
                    <span>Musik</span>
                    <span class="volume-value" id="music-vol-value">35%</span>
                </div>
                <input type="range" id="slider-music" class="volume-slider slider-cyan" min="0" max="100" value="35">
            </div>

            <div class="volume-group">
                <div class="volume-label">
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                    <span>Efek Suara</span>
                    <span class="volume-value" id="sfx-vol-value">60%</span>
                </div>
                <input type="range" id="slider-sfx" class="volume-slider slider-magenta" min="0" max="100" value="60">
            </div>
        </div>
    </div>

    <script src="audio.js"></script>
    <script src="game.js"></script>
</body>
</html>
