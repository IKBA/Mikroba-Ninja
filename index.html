<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Antigravity Microbe Ninja</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        
        <!-- Sisi Kiri: Tim Bakteri -->
        <div id="side-left" class="game-side">
            <div class="hud">
                <div class="team-name text-cyan">TIM BAKTERI</div>
                <div class="stats">
                    <div class="score">LVL <span id="level-left">1</span> | Skor: <span id="score-left">0</span></div>
                    <div class="lives" id="lives-left">
                        <div class="heart"></div>
                        <div class="heart"></div>
                        <div class="heart"></div>
                    </div>
                </div>
            </div>
            <canvas id="canvas-left"></canvas>
        </div>

        <!-- Pembatas Tengah Layar -->
        <div id="center-divider"></div>

        <!-- Sisi Kanan: Tim Virus -->
        <div id="side-right" class="game-side">
            <div class="hud">
                <div class="team-name text-magenta">TIM VIRUS</div>
                <div class="stats">
                    <div class="score">LVL <span id="level-right">1</span> | Skor: <span id="score-right">0</span></div>
                    <div class="lives" id="lives-right">
                        <div class="heart"></div>
                        <div class="heart"></div>
                        <div class="heart"></div>
                    </div>
                </div>
            </div>
            <canvas id="canvas-right"></canvas>
        </div>

    </div>

    <!-- UI Overlay Layar Penuh (Awal/Game Over) -->
    <div id="ui-overlay" class="overlay active">
        <div id="start-screen" class="panel active">
            <h1 class="glitch-text" data-text="MICROBE NINJA">MICROBE NINJA</h1>
            <p class="subtitle">Antigravity Zero-G Simulation</p>
            
            <div class="instructions-row">
                <div class="instruction-box border-cyan">
                    <h3 class="text-cyan">Pemain Kiri</h3>
                    <p>Potong <strong>Bakteri Hijau</strong></p>
                    <p>Hindari <strong>Virus Merah</strong>!</p>
                </div>
                <div class="instruction-box border-magenta">
                    <h3 class="text-magenta">Pemain Kanan</h3>
                    <p>Potong <strong>Virus Merah</strong></p>
                    <p>Hindari <strong>Bakteri Hijau</strong>!</p>
                </div>
            </div>

            <button id="btn-start" class="btn">MULAI SIMULASI</button>
        </div>

        <div id="game-over-screen" class="panel">
            <h1 class="glitch-text text-red" data-text="SIMULASI BERAKHIR">SIMULASI BERAKHIR</h1>
            <div id="winner-text" class="subtitle"></div>
            
            <div class="final-scores">
                <div class="final-score-box text-cyan">
                    <p>Bakteri</p>
                    <h2 id="final-score-left">0</h2>
                </div>
                <div class="final-score-box text-magenta">
                    <p>Virus</p>
                    <h2 id="final-score-right">0</h2>
                </div>
            </div>

            <button id="btn-restart" class="btn">ULANGI SIMULASI</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
